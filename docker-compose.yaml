version: "3.8"

services:
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: jenkins
    ports:
      - "8080:8080"     # Jenkins UI
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
      CASC_JENKINS_CONFIG: "/var/jenkins_home/casc/jenkins.yaml"
      # pass secrets via env or Docker/K8s secrets in real use:
      ADMIN_USER: "admin"
      ADMIN_PASS: "change_me"
    volumes:
      - jenkins_home:/var/jenkins_home
      - ./jenkins/casc:/var/jenkins_home/casc:ro
      - ./jenkins/plugins.txt:/usr/share/jenkins/ref/plugins.txt:ro
      - ./jenkins/jobs.groovy:/var/jenkins_home/jobs/seed-job/workspace/jobs.groovy:ro

volumes:
  jenkins_home:
